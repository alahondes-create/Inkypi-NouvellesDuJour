{% extends "plugin.html" %}

{% block content %}

<div class="page">

    <div class="header">
        <div class="title">🗞️ Journal du Jour</div>
        <div class="date">{{ date }}</div>
    </div>

  <div class="news-container">
    <!-- Exemple : afficher une liste de news -->
    {% for item in news_items %}
      <div class="news-item">{{ item.title }}</div>
    {% endfor %}
  </div>

</div>

{% endblock %}
